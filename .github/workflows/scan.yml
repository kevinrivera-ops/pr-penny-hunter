name: Penny Hunter

on:
  schedule:
    - cron: "0 */4 * * *"

  workflow_dispatch:


jobs:

  scan:

    runs-on: ubuntu-latest

    steps:

    - uses: actions/checkout@v4
    
    - name: Show files
      run: ls -la

    - uses: actions/setup-python@v5
      with:
        python-version: "3.x"

    - run: pip install -r requirements.txt

    - run: python scan.py

      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
